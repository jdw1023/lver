name: Linux Package Update Tracker

on:
  schedule:
    - cron: '0 0 * * 0'  # Runs at 00:00, only on Sunday
  workflow_dispatch:      # Allow running manually

permissions:
  contents: write         # Allow committing/pushing package snapshots to the repo

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run tracking script
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python check_updates.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add history/ docs/
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update package stats and dashboard: $(date -u +'%Y-%m-%d')" && git push)
